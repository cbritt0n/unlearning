name: Feature request
description: Propose an adapter, API, or evaluation improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What’s the pain?
      description: What are you trying to do that the project doesn’t cover well yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - engine adapter (Milvus, etc.)
        - API / control plane
        - compliance / proofs
        - benchmarks / eval
        - docs / DX
        - other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: nonclaims
    attributes:
      label: Scope
      options:
        - label: I get that this is index residual control, not a full legal GDPR product
