version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3

  # Keep noise down: native builds are sensitive; prefer manual bumps for core
  # build-system pins until CI is stable.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "hnswlib"
      - dependency-name: "cmake"
      - dependency-name: "setuptools"
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
