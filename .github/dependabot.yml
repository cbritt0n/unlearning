version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    # Native extension builds; keep updates reviewable
    ignore:
      - dependency-name: "hnswlib"
        update-types: ["version-update:semver-major"]
