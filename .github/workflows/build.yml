# Build native wheels (cibuildwheel) + unit tests + Docker image check.
name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_archs: x86_64

          - name: linux-aarch64
            os: ubuntu-24.04-arm
            cibw_archs: aarch64

          - name: macos-arm64
            os: macos-14
            cibw_archs: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip "cibuildwheel==2.22.0"

      - name: Build wheels and run unit tests
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_BEFORE_BUILD: >-
            pip install cmake ninja "pybind11>=2.12" "numpy>=1.26" setuptools wheel
          CIBW_TEST_REQUIRES: >-
            pytest>=8.0.0 httpx>=0.27.0 numpy>=1.26.0
            fastapi>=0.110.0 cryptography>=42.0.0 uvicorn>=0.27.0
          CIBW_TEST_COMMAND: >-
            pytest {project}/tests -v --ignore={project}/tests/benchmark.py
          CIBW_BUILD_VERBOSITY: "1"
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14

  # Fast pure-Python gate (imports after a source build on Linux)
  smoke:
    name: smoke (ubuntu source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools and package
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"
          python -c "import hnsw_healer; print(hnsw_healer.__version__)"
      - name: Unit tests
        run: pytest tests/ -v --ignore=tests/benchmark.py

  docker:
    name: docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: hnsw-healer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-success:
    name: CI green
    if: always()
    needs: [build_wheels, smoke, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Check dependent jobs
        run: |
          echo "build_wheels=${{ needs.build_wheels.result }}"
          echo "smoke=${{ needs.smoke.result }}"
          echo "docker=${{ needs.docker.result }}"
          if [ "${{ needs.build_wheels.result }}" != "success" ] \
             || [ "${{ needs.smoke.result }}" != "success" ] \
             || [ "${{ needs.docker.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All checks passed."
